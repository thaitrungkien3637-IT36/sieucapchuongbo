<!DOCTYPE html>
<h1>Trang trại bò tuất</h1>
<p>Chuồng bò 12T2</p>
<p>vui lòng nhập thông tin họ tên bò thành viên <br> nhớ viết hoa đầy đủ </p>

<input type="text" id="oNhapTen" placeholder="Nhập tên bò muốn tìm " oninput="kiemTraChua()">

<br><br>

<img id="anhMeo" src="botuat.jpg.jfif" alt="Ảnh mèo" width="300" hidden>
<img id="anhCho" src="manhgay.jpg.jfif" alt="Ảnh chó" width="300" hidden>
<img id="anhtuong" src="tuonggay.jfif" alt="Ảnh tưởng" width="300" hidden>

<script>
function kiemTraChua() {
    var tenNhap = document.getElementById("oNhapTen").value;
    var oAnhMeo = document.getElementById("anhMeo");
    var oAnhCho = document.getElementById("anhCho");
    var oAnhTuong = document.getElementById("anhtuong");

    // Mặc định ban đầu là ẩn cả 2 ảnh đi để reset mỗi khi gõ chữ
    oAnhMeo.hidden = true;
    oAnhCho.hidden = true;
    oAnhTuong.hidden = true;

    // Bắt đầu kiểm tra điều kiện:
    if (tenNhap === "Nguyễn Văn Thắng" || tenNhap === "thang" || tenNhap === "bò ngu") {
        oAnhMeo.hidden = false;
    } 
    else if (tenNhap === "Phan Đức Mạnh" || tenNhap === "manh") {
        oAnhCho.hidden = false;
    }
    else if (tenNhap === "tuong" || tenNhap === "Thái Minh Tường" || tenNhap === "Thái Bá Tưởng") {
        oAnhTuong.hidden = false;
    }
}
</script>
<style>
    /* 1. Thay đổi toàn bộ nền và chữ của trang web */
    body {
        background-color: #1e1e1e; /* Đổi nền thành màu đen xám cực ngầu */
        color: #ffffff;            /* Đổi toàn bộ chữ thành màu trắng cho dễ đọc */
        font-family: Arial, sans-serif; /* Đổi font chữ nhìn cho hiện đại, không bị lỗi thời */
        padding: 40px;             /* Tạo khoảng cách thụt vào từ rìa màn hình */
    }

    /* 2. Trang trí cho ô nhập tên (Input) */
    input[type="text"] {
        width: 300px;              /* Cho ô nhập dài ra bằng với chiều rộng của ảnh */
        padding: 12px 20px;        /* Làm ô nhập to và dày dặn hơn */
        font-size: 16px;           /* Chữ gõ vào to hơn */
        border: 2px solid #4caf50; /* Đổi viền thành màu xanh lá cây */
        border-radius: 8px;        /* Bo tròn 4 góc của ô nhập nhìn cho mượt */
        background-color: #2d2d2d; /* Nền của ô nhập màu tối hơn một chút */
        color: white;              /* Chữ gõ vào màu trắng */
        outline: none;             /* Tắt cái viền xanh mặc định đáng ghét của trình duyệt khi bấm vào */
    }

    /* 3. Trang trí cho các bức ảnh */
    img {
        margin-top: 20px;          /* Tạo một khoảng cách phía trên ảnh, không cho nó dính sát vào ô input */
        border-radius: 12px;       /* Bo tròn góc ảnh cho đẹp */
        box-shadow: 0px 8px 16px rgba(0,0,0,0.5); /* Tạo hiệu ứng đổ bóng dưới ảnh nhìn như ảnh nổi lên */
    }
</style>
